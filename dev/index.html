<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    /* Without this, opening /dev (no trailing slash, no index.html) makes relative URLs resolve to the site root → 404 */
    (function () {
      var p = window.location.pathname;
      if (p.endsWith(".html")) {
        p = p.slice(0, p.lastIndexOf("/") + 1);
      } else if (p && !p.endsWith("/")) {
        p += "/";
      }
      var b = document.createElement("base");
      b.href = window.location.origin + (p || "/");
      var s = document.currentScript;
      s.parentNode.insertBefore(b, s.nextSibling);
    })();
  </script>
  <title>Water Heater Card - Dev Harness</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --primary-color: #4285f4;
      --primary-text-color: #1f1f1f;
      --secondary-text-color: #5f6368;
      --card-background-color: #ffffff;
      --disabled-color: #9e9e9e;
      --warning-color: #ff9800;
      --error-color: #d32f2f;
      --success-color: #2e7d32;
      --info-color: #1565c0;
      --ha-card-border-radius: 16px;
      --ha-card-box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.06),
        0 1px 3px rgba(0, 0, 0, 0.04);
      background-color: #f0f2f5;
      color: var(--primary-text-color);
      font-family: "Inter Variable", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 1.75rem;
    }

    .card-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h2 {
      margin: 0;
      font-size: 0.75rem;
      color: #80868b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    ha-card {
      display: block;
      width: 100%;
    }

    water-heater-card {
      display: block;
      width: 100%;
      min-width: 0;
    }

    .grid-slot {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      min-width: 0;
    }
  </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <style>
      ha-icon { font-size: 24px; display: inline-flex; }
    </style>
  </head>
<body>
  <h1>Dev Harness: Water Heater Card</h1>
  <p>This harness mocks the Home Assistant environment. Use Chrome Dev Tools to inspect and tweak CSS variables.</p>
  
  <div class="grid" id="container"></div>

  <script type="module">
    // Mock HA components before loading the card
    customElements.define('ha-card', class extends HTMLElement {});
      customElements.define('ha-icon', class extends HTMLElement {
        static get observedAttributes() { return ['icon']; }
        set icon(val) { this.setAttribute('icon', val); }
        get icon() { return this.getAttribute('icon'); }
        attributeChangedCallback(name, oldVal, newVal) {
          if (!newVal) return;
          const iconName = newVal.split(':')[1] || newVal;
          this.style.display = 'inline-flex';
          this.style.alignItems = 'center';
          this.style.justifyContent = 'center';
          this.innerHTML = `<i class="mdi mdi-${iconName}" role="presentation" aria-hidden="true"></i>`;
        }
      });

      // Sync properties to attributes for the mock to see them
      setInterval(() => {
        document.querySelectorAll('ha-icon, whc-stepper, whc-chip, whc-shape').forEach(el => {
          if (el.icon) el.setAttribute('icon', el.icon);
          if (el.value !== undefined) el.setAttribute('value', el.value);
        });
      }, 500);

    window.customCards = window.customCards || [];
  </script>

  <!-- Built by `npm run build` → dev/harness-bundle.js (not committed; avoids 404 when dist/ isn’t served) -->
  <script type="module" src="./harness-bundle.js"></script>
  
  <!-- Load the mock harness logic -->
  <script type="module" src="./mock-hass.js"></script>
</body>
</html>
