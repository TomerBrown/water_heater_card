# Publish a GitHub Release when you push a semver tag like v0.3.5.
# HACS uses the latest Release tag name as the displayed version (not commit SHAs).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build bundle
        run: |
          npm ci
          npm run type-check
          npm run build

      - name: Attach card to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: water-heater-card.js
          generate_release_notes: true
